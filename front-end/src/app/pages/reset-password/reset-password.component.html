<div class="container" id="container">
  <div class="form-container sign-in-container">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <h1>Nova Senha</h1>
      <span>Digite sua nova senha abaixo</span>

      <input type="password" formControlName="newPassword" placeholder="Nova Senha" />
      <div *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" class="error">
        <span *ngIf="form.get('newPassword')?.errors?.['required']">A senha é obrigatória.</span>
        <span *ngIf="form.get('newPassword')?.errors?.['minlength']">Mínimo de 6 caracteres.</span>
      </div>

      <input type="password" formControlName="confirmPassword" placeholder="Confirmar Nova Senha" />
      <div *ngIf="form.get('confirmPassword')?.touched" class="error">
        <span *ngIf="form.get('confirmPassword')?.errors?.['required']">A confirmação é obrigatória.</span>
        <span *ngIf="form.hasError('mismatch') && !form.get('confirmPassword')?.errors?.['required']">As senhas não coincidem.</span>
      </div>

      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Redefinindo...' : 'Redefinir Senha' }}
      </button>

      <a routerLink="/login">Voltar para o Login</a>
    </form>
  </div>

  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-right">
        <h1>Redefinição de Senha</h1>
        <p>Escolha uma senha segura e fácil de lembrar.</p>
      </div>
    </div>
  </div>
</div>
